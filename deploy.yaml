import: 
  - recipe/laravel.php

config:
  repository: 'https://github.com/RobinVaga/Raamistik'
  keep_releases: 2

hosts:
  stage:
    hostname: 'ta24vaga.itmajakas.ee'
    http_user: virt137764
    remote_user: virt137764
    deploy_path: '~/domeenid/www.ta24vaga.itmajakas.ee/bookstore'
    shared_files:
     - .env

tasks:
  npm:production:
  - run: 'cd {{release_path}} && npm ci'
  - run: 'cd {{release_path}} && npm run build'

  deploy:public_htaccess:
    - run: |
        echo '<IfModule mod_rewrite.c>
          RewriteEngine On
          RewriteRule ^(.*)$ current/public/$1 [L]
        </IfModule>' > {{deploy_path}}/.htaccess


  opcache:clear:
    - run: killall php84-cgi || true

  deploy:
    - 'deploy:prepare'
    - 'deploy:vendors'
    - 'npm:production'
    - 'artisan:storage:link'
    - 'artisan:optimize:clear'
    - 'artisan:optimize'
    - 'deploy:publish'
    - 'deploy:public_htaccess'

after:
  deploy:failed: deploy:unlock

before:
  deploy:success: opcache:clear