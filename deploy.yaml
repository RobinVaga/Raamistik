import: 
  - recipe/laravel.php

config:
  repository: 'https://github.com/RobinVaga/Raamistik'
  keep_releases: 2

hosts:
  stage:
    hostname: 'ta24vaga.itmajakas.ee'
    http_user: virt137764
    remote_user: virt137764
    deploy_path: '~/domeenid/www.ta24vaga.itmajakas.ee/bookstore'

tasks:
  env:setup:
  - run: 'cat > {{release_path}}/.env << EOF
APP_NAME=Bookstore
APP_ENV=production
APP_DEBUG=false
APP_URL=https://bookstore.ta24vaga.itmajakas.ee

LOG_CHANNEL=stack
LOG_LEVEL=info

SESSION_DRIVER=database

CACHE_STORE=file
EOF'

  npm:production:
  - run: 'cd {{release_path}} && npm ci'
  - run: 'cd {{release_path}} && npx vite build'

  opcache:clear:
    - run: killall php84-cgi || true

  deploy:
    - 'deploy:prepare'
    - 'env:setup'
    - 'deploy:vendors'
    - 'npm:production'
    - 'artisan:storage:link'
    - 'artisan:optimize:clear'
    - 'artisan:optimize'
    - 'artisan:migrate'
    - 'deploy:publish'

after:
  deploy:failed: deploy:unlock

before:
  deploy:success: opcache:clear